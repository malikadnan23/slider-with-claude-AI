<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Smooth Slider</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #0d0d0d;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 2rem;
  }

  .slider-wrap {
    width: 100%;
    max-width: 860px;
  }

  /* ── Stage ── */
  .slider-stage {
    position: relative;
    width: 100%;
    border-radius: 18px;
    overflow: hidden;
    aspect-ratio: 16 / 7;
    background: #111;
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }

  /* ── Track ── */
  .slides {
    display: flex;
    height: 100%;
    transition: transform 0.65s cubic-bezier(0.77, 0, 0.175, 1);
    will-change: transform;
  }

  /* ── Individual slide ── */
  .slide {
    min-width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    transition: transform 8s ease;
    transform: scale(1.05);
  }

  .slides[data-active] .slide.active img {
    transform: scale(1.0);
  }

  /* dark gradient overlay */
  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to top,
      rgba(0,0,0,0.75) 0%,
      rgba(0,0,0,0.2) 50%,
      rgba(0,0,0,0.05) 100%
    );
  }

  /* ── Caption ── */
  .slide-caption {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 2;
    padding: 1.8rem 2rem;
    color: #fff;
    transform: translateY(8px);
    opacity: 0;
    transition: transform 0.5s ease 0.25s, opacity 0.5s ease 0.25s;
  }

  .slide.active .slide-caption {
    transform: translateY(0);
    opacity: 1;
  }

  .slide-num {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.55);
    margin-bottom: 5px;
  }

  .slide-title {
    font-size: clamp(20px, 3vw, 28px);
    font-weight: 600;
    line-height: 1.2;
    margin-bottom: 5px;
  }

  .slide-desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.6;
    max-width: 400px;
  }

  /* ── Progress bar ── */
  .progress {
    position: absolute;
    bottom: 0; left: 0;
    height: 3px;
    background: #fff;
    width: 0%;
    z-index: 10;
    transition: width linear;
    border-radius: 0 2px 2px 0;
  }

  /* ── Arrows ── */
  .arrow {
    position: absolute;
    top: 50%; transform: translateY(-50%);
    z-index: 10;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 50%;
    width: 44px; height: 44px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
    color: #fff;
    font-size: 20px;
    line-height: 1;
  }
  .arrow:hover { background: rgba(255,255,255,0.18); }
  .arrow:active { transform: translateY(-50%) scale(0.92); }
  .arrow-prev { left: 14px; }
  .arrow-next { right: 14px; }

  /* ── Dots + thumbnails ── */
  .controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    gap: 12px;
  }

  .dots {
    display: flex;
    gap: 7px;
    align-items: center;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    border: none;
    cursor: pointer;
    padding: 0;
    transition: background 0.25s, transform 0.25s, width 0.25s;
  }
  .dot.active {
    background: #fff;
    width: 22px;
    border-radius: 4px;
    transform: none;
  }

  .thumb-row {
    display: flex;
    gap: 8px;
  }

  .thumb {
    width: 64px;
    aspect-ratio: 16/10;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.2s, opacity 0.2s;
    opacity: 0.45;
    background: #222;
    padding: 0;
  }
  .thumb img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .thumb.active { border-color: #fff; opacity: 1; }
  .thumb:hover { opacity: 0.8; }

  /* ── Counter ── */
  .counter {
    font-size: 13px;
    color: rgba(255,255,255,0.4);
    white-space: nowrap;
    min-width: 42px;
    text-align: right;
  }
  .counter span { color: #fff; font-weight: 600; }
</style>
</head>
<body>

<div class="slider-wrap">
  <div class="slider-stage" id="stage">
    <div class="slides" id="slides"></div>
    <div class="progress" id="progress"></div>
    <button class="arrow arrow-prev" id="prev" aria-label="Previous">&#8592;</button>
    <button class="arrow arrow-next" id="next" aria-label="Next">&#8594;</button>
  </div>

  <div class="controls">
    <div class="dots" id="dots"></div>
    <div class="thumb-row" id="thumbs"></div>
    <div class="counter" id="counter"><span>1</span> / 5</div>
  </div>
</div>

<script>
const data = [
  {
    img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=1200&q=80',
    num: '01', title: 'Alpine Silence', desc: 'Snow-capped peaks dissolving into cloud — a world untouched by sound.'
  },
  {
    img: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=1200&q=80',
    num: '02', title: 'Forest Light', desc: 'Morning rays piercing the canopy — gold threading through ancient green.'
  },
  {
    img: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1200&q=80',
    num: '03', title: 'Ocean Edge', desc: 'Turquoise shallows meeting white sand — horizon endlessly open.'
  },
  {
    img: 'https://images.unsplash.com/photo-1477959858617-67f85cf4f1df?w=1200&q=80',
    num: '04', title: 'City After Rain', desc: 'Neon reflections on wet streets — the city\'s second face.'
  },
  {
    img: 'https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1200&q=80',
    num: '05', title: 'Desert Dusk', desc: 'Last light painting the canyon walls — warm stone cooling into night.'
  }
];

const TOTAL = data.length;
const AUTO_DELAY = 4500;
let current = 0, autoTimer, isPaused = false;

const slidesEl = document.getElementById('slides');
const dotsEl   = document.getElementById('dots');
const thumbsEl = document.getElementById('thumbs');
const progressEl = document.getElementById('progress');
const stage    = document.getElementById('stage');
const counterEl = document.getElementById('counter');

// Build slides
data.forEach((d, i) => {
  const s = document.createElement('div');
  s.className = 'slide' + (i === 0 ? ' active' : '');
  s.innerHTML = `
    <img src="${d.img}" alt="${d.title}" loading="${i === 0 ? 'eager' : 'lazy'}" />
    <div class="slide-caption">
      <p class="slide-num">Slide ${d.num}</p>
      <h2 class="slide-title">${d.title}</h2>
      <p class="slide-desc">${d.desc}</p>
    </div>`;
  slidesEl.appendChild(s);
});

// Build dots
data.forEach((_, i) => {
  const dot = document.createElement('button');
  dot.className = 'dot' + (i === 0 ? ' active' : '');
  dot.setAttribute('aria-label', 'Slide ' + (i + 1));
  dot.addEventListener('click', () => goTo(i, true));
  dotsEl.appendChild(dot);
});

// Build thumbs
data.forEach((d, i) => {
  const t = document.createElement('button');
  t.className = 'thumb' + (i === 0 ? ' active' : '');
  t.setAttribute('aria-label', 'Slide ' + (i + 1));
  t.innerHTML = `<img src="${d.img}" alt="${d.title}" loading="lazy" />`;
  t.addEventListener('click', () => goTo(i, true));
  thumbsEl.appendChild(t);
});

function updateUI() {
  slidesEl.style.transform = `translateX(-${current * 100}%)`;
  slidesEl.querySelectorAll('.slide').forEach((s, i) => s.classList.toggle('active', i === current));
  dotsEl.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
  thumbsEl.querySelectorAll('.thumb').forEach((t, i) => t.classList.toggle('active', i === current));
  counterEl.innerHTML = `<span>${current + 1}</span> / ${TOTAL}`;
}

function startProgress() {
  clearTimeout(progressEl._t);
  progressEl.style.transition = 'none';
  progressEl.style.width = '0%';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    progressEl.style.transition = `width ${AUTO_DELAY}ms linear`;
    progressEl.style.width = '100%';
  }));
}

function goTo(n, userAction = false) {
  current = (n + TOTAL) % TOTAL;
  updateUI();
  if (userAction) { clearTimeout(autoTimer); scheduleNext(); }
  startProgress();
}

function scheduleNext() {
  clearTimeout(autoTimer);
  autoTimer = setTimeout(() => goTo(current + 1), AUTO_DELAY);
}

document.getElementById('prev').addEventListener('click', () => goTo(current - 1, true));
document.getElementById('next').addEventListener('click', () => goTo(current + 1, true));

stage.addEventListener('mouseenter', () => {
  isPaused = true;
  clearTimeout(autoTimer);
  progressEl.style.transition = 'none';
});
stage.addEventListener('mouseleave', () => {
  isPaused = false;
  scheduleNext();
  startProgress();
});

let tx = 0;
stage.addEventListener('touchstart', e => { tx = e.touches[0].clientX; }, { passive: true });
stage.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx) > 40) goTo(dx < 0 ? current + 1 : current - 1, true);
}, { passive: true });

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  goTo(current - 1, true);
  if (e.key === 'ArrowRight') goTo(current + 1, true);
});

goTo(0);
scheduleNext();
</script>
</body>
</html>
